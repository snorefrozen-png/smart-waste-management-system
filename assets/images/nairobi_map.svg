<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="400" fill="url(#bg)" rx="8"/>
  
  <!-- Title -->
  <text x="250" y="25" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#1B5E20">NAIROBI CITY ZONES - WASTE MANAGEMENT MAP</text>
  
  <!-- Kasarani -->
  <rect x="300" y="35" width="120" height="60" rx="8" fill="#a5d6a7" stroke="#2E7D32" stroke-width="1.5" opacity="0.85"/>
  <text x="360" y="70" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="600" fill="#1B5E20">Kasarani</text>
  
  <!-- Westlands -->
  <rect x="160" y="45" width="120" height="55" rx="8" fill="#81c784" stroke="#2E7D32" stroke-width="1.5" opacity="0.85"/>
  <text x="220" y="78" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="600" fill="#1B5E20">Westlands</text>
  
  <!-- Eastleigh -->
  <rect x="300" y="110" width="120" height="55" rx="8" fill="#ffcc80" stroke="#e65100" stroke-width="1.5" opacity="0.85"/>
  <text x="360" y="142" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="600" fill="#bf360c">Eastleigh</text>
  
  <!-- CBD -->
  <rect x="190" y="115" width="95" height="55" rx="8" fill="#fff176" stroke="#f57f17" stroke-width="2" opacity="0.9"/>
  <text x="237" y="148" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="700" fill="#e65100">CBD</text>
  
  <!-- Dagoretti -->
  <rect x="30" y="120" width="140" height="65" rx="8" fill="#b2dfdb" stroke="#00695c" stroke-width="1.5" opacity="0.85"/>
  <text x="100" y="158" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="600" fill="#004d40">Dagoretti</text>
  
  <!-- Starehe -->
  <rect x="210" y="185" width="100" height="50" rx="8" fill="#ce93d8" stroke="#6a1b9a" stroke-width="1.5" opacity="0.85"/>
  <text x="260" y="215" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="600" fill="#4a148c">Starehe</text>
  
  <!-- Embakasi -->
  <rect x="335" y="180" width="130" height="75" rx="8" fill="#90caf9" stroke="#1565c0" stroke-width="1.5" opacity="0.85"/>
  <text x="400" y="222" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="600" fill="#0d47a1">Embakasi</text>
  
  <!-- Kibera -->
  <rect x="120" y="210" width="115" height="60" rx="8" fill="#ef9a9a" stroke="#c62828" stroke-width="1.5" opacity="0.85"/>
  <text x="177" y="245" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="600" fill="#b71c1c">Kibera</text>
  
  <!-- Langata -->
  <rect x="100" y="290" width="130" height="65" rx="8" fill="#a5d6a7" stroke="#2E7D32" stroke-width="1.5" opacity="0.85"/>
  <text x="165" y="327" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="600" fill="#1B5E20">Langata</text>
  
  <!-- Karen -->
  <rect x="15" y="290" width="75" height="65" rx="8" fill="#c5e1a5" stroke="#33691e" stroke-width="1.5" opacity="0.85"/>
  <text x="52" y="327" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="600" fill="#1b5e20">Karen</text>
  
  <!-- Legend -->
  <rect x="340" y="310" width="145" height="75" rx="6" fill="rgba(255,255,255,0.9)" stroke="#bdbdbd"/>
  <text x="412" y="330" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="600" fill="#424242">CLICK A ZONE</text>
  <text x="412" y="345" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9" fill="#757575">to filter reports</text>
  <circle cx="360" cy="362" r="5" fill="#4caf50"/><text x="372" y="365" font-family="Inter,Arial,sans-serif" font-size="9" fill="#424242">Residential</text>
  <circle cx="360" cy="376" r="5" fill="#ff9800"/><text x="372" y="379" font-family="Inter,Arial,sans-serif" font-size="9" fill="#424242">Commercial</text>
</svg>
